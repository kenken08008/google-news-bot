name: Run Google News Bot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install playwright feedparser
          playwright install --with-deps chromium

      - name: 実行
        run: python google_news_redirect.py
